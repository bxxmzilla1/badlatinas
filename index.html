<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Embed + Auto Scroll</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 200vh; /* extra height so page can scroll */
      background: #000;
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      border: 0;
    }
  </style>
</head>
<body>

  <iframe
    src="https://link.me/ava.xo"
    allow="fullscreen; autoplay"
    allowfullscreen>
  </iframe>

  <script>
    window.addEventListener("load", () => {
      setTimeout(() => {
        window.scrollTo({
          top: 600,
          behavior: "smooth"
        });
      }, 3000);
    });
  </script>

</body>
</html>
