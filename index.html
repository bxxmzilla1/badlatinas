<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Split Iframe View</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .half {
      width: 100%;
      height: 50vh;
      position: relative;
      overflow: hidden;
    }

    /* 🔥 Responsive top container */
    .top-frame {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    .top-frame iframe {
      position: absolute;
      top: -5%;
      left: -5%;
      width: 110%;
      height: 120%;
      border: none;
    }

    /* Bottom iframe full fit */
    .bottom-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <!-- TOP HALF — auto fits width -->
  <div class="half top-frame">
    <iframe
      src="https://cbxyz.com/in/?tour=SHBY&campaign=uaaeB&track=embed&room=aviebby"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <!-- BOTTOM HALF -->
  <div class="half bottom-frame">
    <iframe
      src="https://link.me/ava.xo"
      allow="fullscreen"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
