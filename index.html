<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Split Iframe View</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    .split {
      height: 50vh;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    /* Top custom crop container */
    .top-inner {
      width: 1000px;
      height: 550px;
      overflow: hidden;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .top-inner iframe {
      position: absolute;
      top: -40px;
      left: -10px;
      width: 1200px;
      height: 800px;
      border: none;
    }

    /* Bottom iframe */
    .bottom iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <!-- TOP HALF -->
  <div class="split">
    <div class="top-inner">
      <iframe
        src="https://cbxyz.com/in/?tour=SHBY&campaign=uaaeB&track=embed&room=aviebby"
        allow="autoplay; fullscreen"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <!-- BOTTOM HALF -->
  <div class="split bottom">
    <iframe
      src="https://link.me/ava.xo"
      allow="fullscreen"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
