<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stacked Iframes</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* base iframe */
    .base-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      z-index: 1;
    }

    /* top overlay container */
    .top-frame {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 1000px;
      height: 550px;
      transform: translate(-50%, -50%);
      overflow: hidden;
      z-index: 2;
      pointer-events: auto;
    }

    .top-frame iframe {
      position: absolute;
      top: -40px;
      left: -10px;
      width: 1200px;
      height: 800px;
      border: none;
    }
  </style>
</head>
<body>

  <!-- bottom iframe -->
  <iframe
    class="base-frame"
    src="https://link.me/ava.xo"
    allow="fullscreen; autoplay"
    allowfullscreen>
  </iframe>

  <!-- top iframe overlay -->
  <div class="top-frame">
    <iframe 
      src="https://cbxyz.com/in/?tour=SHBY&campaign=uaaeB&track=embed&room=aviebby">
    </iframe>
  </div>

</body>
</html>
