<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bottom Crop Embed</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
    }

    .frame-wrap {
      width: 100%;
      height: 400px;          /* visible bottom area height */
      overflow: hidden;       /* hides top part */
      position: relative;
    }

    .frame-wrap iframe {
      width: 100%;
      height: 1200px;         /* taller than container */
      border: 0;
      position: absolute;
      top: -800px;            /* shift up to reveal bottom */
      left: 0;
    }
  </style>
</head>
<body>

  <div class="frame-wrap">
    <iframe
      src="https://link.me/ava.xo"
      allow="fullscreen; autoplay"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
